name: KingMC Java Bot

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: "Account ID"
        required: true
      webhook_url:
        description: "Webhook URL"
        required: true
      webhook_token:
        description: "Webhook Token"
        required: true
      mc_username:
        description: "Minecraft Username"
        required: true
      mc_password:
        description: "Minecraft Password"
        required: false
        default: "zennopro11"
      server_host:
        description: "Server Host"
        required: false
        default: "kingmc.vn"
      run_duration_sec:
        description: "Run Duration"
        required: false
        default: "20400"

jobs:
  afk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run Java Bot
        env:
          CLOUD_MODE: "true"
          ACCOUNT_ID: ${{ inputs.account_id }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          WEBHOOK_TOKEN: ${{ inputs.webhook_token }}
          MC_USERNAME: ${{ inputs.mc_username }}
          MC_PASSWORD: ${{ inputs.mc_password }}
          SERVER_HOST: ${{ inputs.server_host }}
          RUN_DURATION_SEC: ${{ inputs.run_duration_sec }}
        run: node afk-worker.js

      - name: Chain Restart
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'afk.yml',
                ref: context.ref,
                inputs: {
                  account_id: '${{ inputs.account_id }}',
                  webhook_url: '${{ inputs.webhook_url }}',
                  webhook_token: '${{ inputs.webhook_token }}',
                  mc_username: '${{ inputs.mc_username }}',
                  mc_password: '${{ inputs.mc_password }}',
                  server_host: '${{ inputs.server_host }}',
                  run_duration_sec: '${{ inputs.run_duration_sec }}'
                }
              })
            } catch (err) {}
